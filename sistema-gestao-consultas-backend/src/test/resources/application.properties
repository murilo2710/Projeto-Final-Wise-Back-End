spring.datasource.url=jdbc:h2:mem:sistema_gestao_consultas_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

security.jwt.secret=local-test-secret-with-at-least-32-characters
security.jwt.expiration-ms=86400000

logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR
