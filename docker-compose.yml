services:
  mysql:
    image: mysql:8.0
    container_name: odonto-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sistema_gestao_consultas
      MYSQL_ROOT_PASSWORD: 123456
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sistema-gestao-consultas-backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sistema-gestao-consultas-backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./sistema-gestao-consultas-backend
    container_name: odonto-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sistema_gestao_consultas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: docker-local-secret-with-at-least-32-characters
      JWT_REFRESH_EXPIRATION_MS: 604800000
      UPLOAD_DIR: /app/uploads
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  mysql_data:
  backend_uploads:
